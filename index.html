<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">

<title>Hormuz Watch</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&family=Rajdhani:wght@600;700&family=Share+Tech+Mono&display=swap');
:root{--bg:#050a0f;--sur:#0a1520;--s2:#0f1e2e;--bor:#1a3a5c;--ac:#00c8ff;--red:#ff4444;--amb:#ffaa00;--grn:#00ff88;--gld:#ffd700;--txt:#c8dde8;--dim:#4a7090;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--txt);font-family:'Tajawal',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,200,255,0.025) 1px,transparent 1px),linear-gradient(90deg,rgba(0,200,255,0.025) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0;}
.wrap{position:relative;z-index:1;max-width:920px;margin:0 auto;padding:16px;}
.hdr{display:flex;align-items:center;justify-content:space-between;padding:16px 0 20px;border-bottom:1px solid var(--bor);margin-bottom:20px;flex-wrap:wrap;gap:12px;}
.hdr-l{display:flex;align-items:center;gap:12px;}
.logo{width:46px;height:46px;background:linear-gradient(135deg,#001830,#003060);border:1px solid var(--ac);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:24px;animation:glow 3s ease-in-out infinite alternate;}
@keyframes glow{0%{box-shadow:0 0 20px rgba(0,200,255,0.2)}100%{box-shadow:0 0 40px rgba(0,200,255,0.5)}}
.logo-t h1{font-family:'Rajdhani',sans-serif;font-size:21px;letter-spacing:3px;color:var(--ac);}
.logo-t p{font-size:11px;color:var(--dim);font-family:'Share Tech Mono',monospace;}
.live{display:flex;align-items:center;gap:7px;background:rgba(255,34,68,0.1);border:1px solid rgba(255,34,68,0.4);padding:5px 13px;border-radius:4px;font-size:11px;font-family:'Share Tech Mono',monospace;color:#ff4444;letter-spacing:2px;}
.ldot{width:7px;height:7px;background:#ff4444;border-radius:50%;animation:lp 1s ease-in-out infinite;}
@keyframes lp{0%,100%{opacity:1}50%{opacity:0.15}}
.stats{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:20px;}
@media(min-width:600px){.stats{grid-template-columns:repeat(4,1fr);}}
.stat{background:var(--sur);border:1px solid var(--bor);border-radius:8px;padding:13px 15px;overflow:hidden;position:relative;}
.stat::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--ac),transparent);animation:scan 3s linear infinite;}
@keyframes scan{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}
.sl{font-size:10px;letter-spacing:2px;color:var(--dim);font-family:'Share Tech Mono',monospace;margin-bottom:5px;}
.sv{font-family:'Rajdhani',sans-serif;font-size:24px;line-height:1;}
.sv.bl{color:var(--ac)}.sv.rd{color:var(--red)}.sv.am{color:var(--amb)}.sv.gn{color:var(--grn)}.sv.gl{color:var(--gld)}
.ss{font-size:11px;color:var(--dim);margin-top:3px;}
.card{background:var(--sur);border:1px solid var(--bor);border-radius:10px;padding:18px 20px;margin-bottom:14px;}
.stitle{font-family:'Rajdhani',sans-serif;font-size:12px;letter-spacing:3px;color:var(--ac);text-transform:uppercase;margin-bottom:14px;display:flex;align-items:center;gap:8px;}
.stitle::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--bor),transparent);}
.sprow{display:flex;gap:8px;flex-wrap:wrap;}
.sb{padding:8px 14px;background:var(--s2);border:1px solid var(--bor);color:var(--dim);border-radius:5px;font-family:'Share Tech Mono',monospace;font-size:12px;cursor:pointer;transition:all 0.2s;}
.sb.on{border-color:var(--ac);color:var(--ac);background:rgba(0,200,255,0.08);}
.brow{display:flex;gap:10px;margin-top:14px;flex-wrap:wrap;}
.btn{padding:10px 20px;border-radius:6px;font-family:'Rajdhani',sans-serif;font-size:14px;letter-spacing:1px;cursor:pointer;transition:all 0.3s;border:1px solid;}
.bg{background:linear-gradient(135deg,#003060,#001840);border-color:var(--grn);color:var(--grn);}
.bs{background:linear-gradient(135deg,#200010,#100008);border-color:var(--red);color:var(--red);}
.bn{background:linear-gradient(135deg,#202000,#101000);border-color:var(--amb);color:var(--amb);}
.strow{display:flex;align-items:center;gap:10px;margin-top:12px;}
.sdot{width:10px;height:10px;border-radius:50%;background:var(--red);flex-shrink:0;transition:all 0.5s;}
.sdot.on{background:var(--grn);box-shadow:0 0 8px var(--grn);animation:lp 2s ease-in-out infinite;}
.pw{margin-top:12px;}
.pl{display:flex;justify-content:space-between;font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--dim);margin-bottom:5px;}
.pb{height:3px;background:var(--s2);border-radius:2px;overflow:hidden;}
.pf{height:100%;background:linear-gradient(90deg,var(--ac),var(--grn));border-radius:2px;transition:width 0.1s linear;}
.sgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(185px,1fr));gap:8px;}
.sc{display:flex;align-items:center;gap:8px;padding:9px 13px;background:var(--s2);border:1px solid var(--bor);border-radius:6px;font-size:13px;cursor:pointer;transition:all 0.2s;user-select:none;}
.sc.on{border-color:var(--grn);background:rgba(0,255,136,0.05);color:var(--grn);}
.sc .cd{width:6px;height:6px;border-radius:50%;background:var(--dim);flex-shrink:0;}
.sc.on .cd{background:var(--grn);box-shadow:0 0 5px var(--grn);}
.rl{margin-right:auto;font-size:10px;font-family:'Share Tech Mono',monospace;color:var(--dim);}
.st{font-size:9px;padding:1px 5px;border-radius:3px;font-family:'Share Tech Mono',monospace;}
.st.int{background:rgba(0,200,255,0.1);color:var(--ac);}
.st.mde{background:rgba(255,170,0,0.1);color:var(--amb);}
.st.mil{background:rgba(255,68,68,0.1);color:var(--red);}
.st.irn{background:rgba(128,0,200,0.15);color:#cc88ff;}
.st.trump{background:rgba(255,80,0,0.15);color:#ff6644;}
.fbox{background:var(--sur);border:1px solid var(--bor);border-radius:10px;overflow:hidden;margin-bottom:14px;}
.fhdr{display:flex;align-items:center;justify-content:space-between;padding:11px 17px;background:var(--s2);border-bottom:1px solid var(--bor);}
.fhl{font-family:'Rajdhani',sans-serif;font-size:12px;letter-spacing:2px;color:var(--ac);}
.fhr{font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--dim);}
.empty{padding:36px;text-align:center;color:var(--dim);font-size:13px;}
.ni{padding:13px 17px;border-bottom:1px solid rgba(26,58,92,0.35);animation:sli 0.4s ease;position:relative;}
@keyframes sli{from{opacity:0;transform:translateX(14px)}to{opacity:1;transform:translateX(0)}}
.ni.brk{border-right:3px solid var(--red);}
.ni.hi{border-right:3px solid var(--amb);}
.ni.nm{border-right:3px solid rgba(26,58,92,0.6);}
.ni.tr{border-right:3px solid #ff6644;background:rgba(255,60,0,0.03);}
.nmeta{display:flex;align-items:center;gap:7px;margin-bottom:6px;flex-wrap:wrap;}
.nsrc{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--ac);background:rgba(0,200,255,0.07);padding:2px 7px;border-radius:3px;border:1px solid rgba(0,200,255,0.2);}
.nsrc.tr{color:#ff6644;background:rgba(255,60,0,0.08);border-color:rgba(255,60,0,0.25);}
.ntm{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--dim);}
.ntg{font-size:10px;padding:2px 7px;border-radius:3px;font-family:'Share Tech Mono',monospace;}
.ntg.b{background:rgba(255,34,68,0.15);color:var(--red);border:1px solid rgba(255,34,68,0.3);}
.ntg.m{background:rgba(255,170,0,0.1);color:var(--amb);border:1px solid rgba(255,170,0,0.3);}
.ntg.d{background:rgba(0,200,255,0.07);color:var(--ac);border:1px solid rgba(0,200,255,0.2);}
.ntg.e{background:rgba(0,255,136,0.07);color:var(--grn);border:1px solid rgba(0,255,136,0.2);}
.ntg.t{background:rgba(255,60,0,0.12);color:#ff6644;border:1px solid rgba(255,60,0,0.3);}
.nar{font-size:15px;font-weight:700;color:#ddeef8;margin-bottom:4px;line-height:1.5;}
.nen{font-size:12px;color:var(--dim);font-style:italic;margin-bottom:8px;line-height:1.5;}
.gbox{padding:10px 12px;border-radius:7px;border:1px solid rgba(255,215,0,0.25);background:rgba(255,215,0,0.04);margin-top:4px;}
.gtitle{font-size:10px;color:var(--gld);font-family:'Share Tech Mono',monospace;margin-bottom:5px;letter-spacing:1px;}
.gimp{font-size:13px;font-weight:700;margin-bottom:5px;}
.gimp.up{color:var(--grn);}
.gimp.dn{color:var(--red);}
.gimp.nt{color:var(--amb);}
.gbar{height:5px;background:var(--s2);border-radius:3px;overflow:hidden;margin-bottom:5px;}
.gbarf{height:100%;border-radius:3px;}
.gbarf.up{background:linear-gradient(90deg,#00aa44,var(--grn));}
.gbarf.dn{background:linear-gradient(90deg,#aa0000,var(--red));}
.gbarf.nt{background:linear-gradient(90deg,#aa7700,var(--amb));}
.greason{font-size:12px;color:var(--dim);line-height:1.5;}
.sent{font-size:10px;font-family:'Share Tech Mono',monospace;color:var(--grn);margin-top:5px;}
.alert{display:none;padding:11px 18px;background:rgba(255,34,68,0.1);border:1px solid rgba(255,34,68,0.5);border-radius:8px;margin-bottom:14px;font-size:14px;color:#ff8899;align-items:center;gap:10px;}
.alert.show{display:flex;animation:ap 2s ease-in-out infinite;}
@keyframes ap{0%,100%{border-color:rgba(255,34,68,0.4)}50%{border-color:rgba(255,34,68,0.9);}}
.log{background:#020c14;border:1px solid var(--bor);border-radius:8px;padding:12px;height:130px;overflow-y:auto;font-family:'Share Tech Mono',monospace;font-size:11px;}
.ll{display:flex;gap:8px;margin-bottom:3px;}
.lt{color:var(--dim);flex-shrink:0;}
.lm.ok{color:var(--grn)}.lm.warn{color:var(--amb)}.lm.err{color:var(--red)}.lm.info{color:var(--ac)}
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--bor);border-radius:2px;}
</style>
</head>

</div>

<div class="fbox">

<script>

  "Iran economy is collapsing. Their currency is worthless. All they have to do is call and we can make a GREAT deal!",

var activeSrc = {};
SOURCES.forEach(function(s){ activeSrc[s.id] = true; });

var state = {
  active: false,
  speed: 10000,
  seen: {},
  total: 0,
  sent: 0,
  checks: 0,
  timerId: null,
  progTimer: null,
  progStart: 0,
  poolIdx: 0,
  trumpIdx: 0
};

function renderSrc() {
  var html = '';
  SOURCES.forEach(function(s) {
    var on = activeSrc[s.id] ? 'on' : '';
    html += '<div class="sc ' + on + '" onclick="toggleSrc(\'' + s.id + '\')">';
    html += '<div class="cd"></div>';
    html += '<span>' + s.name + '</span>';
    html += '<span class="rl">' + s.rel + '</span>';
    html += '<span class="st ' + s.type + '">' + s.type.toUpperCase() + '</span>';
    html += '</div>';
  });
  document.getElementById('sgrid').innerHTML = html;
  var count = 0;
  Object.keys(activeSrc).forEach(function(k){ if(activeSrc[k]) count++; });
  document.getElementById('sSrc').textContent = count;
}

function toggleSrc(id) {
  activeSrc[id] = !activeSrc[id];
  renderSrc();
}

function fmtMs(ms) {
  if(ms < 2000) return 'ثانية واحدة';
  if(ms < 60000) return (ms/1000) + ' ثواني';
  return (ms/60000) + ' دقيقة';
}

function setSpd(ms) {
  state.speed = ms;
  var btns = document.querySelectorAll('.sb');
  btns.forEach(function(b) {
    b.classList.toggle('on', parseInt(b.getAttribute('data-ms')) === ms);
  });
  log('سرعة الفحص: كل ' + fmtMs(ms), 'info');
  if(state.active) {
    clearInterval(state.timerId);
    state.timerId = setInterval(fetchNow, ms);
    resetProg();
  }
}

function resetProg() {
  clearInterval(state.progTimer);
  var pw = document.getElementById('pw');
  if(!state.active) { pw.style.display = 'none'; return; }
  pw.style.display = '';
  state.progStart = Date.now();
  state.progTimer = setInterval(function() {
    var el = Date.now() - state.progStart;
    var pct = Math.max(0, 100 - (el / state.speed * 100));
    var rem = Math.max(0, Math.ceil((state.speed - el) / 1000));
    document.getElementById('pf').style.width = pct + '%';
    document.getElementById('psec').textContent = rem > 0 ? rem + 's' : 'جاري...';
  }, 100);
}

    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({chat_id: CHAT_ID, text: msg, parse_mode: 'Markdown'})
  }).then(function(r){ return r.json(); }).then(function(d) {
    if(d.ok) {
      state.sent++;
      document.getElementById('sSent').textContent = state.sent;
      document.getElementById('sLast').textContent = new Date().toLocaleTimeString('ar');
      log('✅ أُرسل: ' + item.ar.substring(0,35) + '...', 'ok');
      markSent(item.id);
    } else {
      log('❌ ' + d.description, 'err');
    }
  }).catch(function(e){ log('❌ ' + e.message, 'err'); });
}

function aiProcess(en, src, callback) {
  var isTrump = src === 'Trump · Truth Social';
  var prompt = isTrump
    ? 'ترجم هذا التصريح لترامب للعربية بدقة مع الحفاظ على أسلوبه القوي. ثم حلل تأثيره على سعر الذهب.\nأعطني JSON فقط بدون أي نص آخر:\n{"ar":"الترجمة العربية","tag":"ترامب 🇺🇸","pri":"high","rel":true,"gold":{"dir":"up","str":8,"why":"سبب التأثير على الذهب بالعربي"}}\n\nالتصريح: "' + en + '"'
    : 'أنت محلل أخبار ومحلل ذهب. ترجم عنوان الخبر للعربية وحلل تأثيره على سعر الذهب.\nأعطني JSON فقط بدون أي نص آخر:\n{"ar":"ترجمة دقيقة","tag":"عاجل 🔴 أو عسكري أو دبلوماسي أو اقتصادي أو عام","pri":"breaking أو high أو normal","rel":true,"gold":{"dir":"up أو down أو neutral","str":رقم من 1 الى 10,"why":"سبب التأثير على الذهب بالعربي"}}\n\nالعنوان: "' + en + '"\nالمصدر: ' + src;

  fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 400,
      messages: [{role: 'user', content: prompt}]
    })
  }).then(function(r){ return r.json(); }).then(function(d) {
    try {
      var txt = d.content[0].text.trim().replace(/```json|```/g,'').trim();
      callback(JSON.parse(txt));
    } catch(e) {
      callback({ar:en, tag:'عام', pri:'normal', rel:true, gold:{dir:'neutral', str:3, why:'تأثير محدود على الذهب'}});
    }
  }).catch(function() {
    callback({ar:en, tag:'عام', pri:'normal', rel:true, gold:{dir:'neutral', str:3, why:'تأثير محدود على الذهب'}});
  });
}

function fetchNow() {
  state.checks++;
  document.getElementById('sChecks').textContent = state.checks;
  log('🔍 فحص #' + state.checks, 'info');
  resetProg();

  var raw = NEWS_POOL[state.poolIdx % NEWS_POOL.length];
  state.poolIdx++;

  var srcId = SRC_MAP[raw.src] || 'reuters';
  if(!state.seen[raw.e] && activeSrc[srcId]) {
    state.seen[raw.e] = true;
    aiProcess(raw.e, raw.src, function(ai) {
      if(ai.rel !== false) {
        var item = {
          en: raw.e, ar: ai.ar, tag: ai.tag || 'عام',
          pri: ai.pri || raw.p, src: raw.src,
          time: new Date().toLocaleTimeString('ar'),
          id: Date.now() + 'n', trump: false,
          gold: ai.gold || {dir:'neutral', str:3, why:'تأثير محدود على الذهب'}
        };
        addNews(item);
        updateGoldStat(item.gold);
        sendTg(item);
        if(item.pri === 'breaking') showAlert('عاجل: ' + item.ar);
      }
    });
  } else {
    log('لا أخبار جديدة في هذا الفحص', 'info');
  }

  if(Math.random() < 0.3 && activeSrc['truth']) {
    var post = TRUMP_POSTS[state.trumpIdx % TRUMP_POSTS.length];
    state.trumpIdx++;
    var key = 'trump_' + state.trumpIdx;
    if(!state.seen[key]) {
      state.seen[key] = true;
      aiProcess(post, 'Trump · Truth Social', function(ai) {
        var item = {
          en: post, ar: ai.ar || post,
          tag: 'ترامب 🇺🇸', pri: 'high',
          src: 'Trump · Truth Social',
          time: new Date().toLocaleTimeString('ar'),
          id: Date.now() + 't', trump: true,
          gold: ai.gold || {dir:'up', str:7, why:'تصريحات ترامب تزيد التوتر وترفع الطلب على الذهب'}
        };
        addNews(item);
        updateGoldStat(item.gold);
        sendTg(item);
      });
    }
  }
}

function updateGoldStat(gold) {
  var el = document.getElementById('sGold');
  var sub = document.getElementById('sGoldSub');
  var arrow = gold.dir === 'up' ? '📈' : (gold.dir === 'down' ? '📉' : '➡️');
  el.textContent = arrow + ' ' + gold.str + '/10';
  sub.textContent = gold.dir === 'up' ? 'ضغط صعودي' : (gold.dir === 'down' ? 'ضغط هبوطي' : 'محايد');
}

function addNews(item) {
  state.total++;
  document.getElementById('sTotal').textContent = state.total;
  document.getElementById('fcount').textContent = state.total + ' خبر';

  var feed = document.getElementById('feed');
  if(feed.querySelector('.empty')) feed.innerHTML = '';

  var tagClass = {'عاجل 🔴':'b','عسكري':'m','دبلوماسي':'d','اقتصادي':'e','ترامب 🇺🇸':'t'};
  var rowClass = item.trump ? 'tr' : (item.pri === 'breaking' ? 'brk' : (item.pri === 'high' ? 'hi' : 'nm'));
  var gDir = item.gold.dir;
  var gIcon = gDir === 'up' ? '📈' : (gDir === 'down' ? '📉' : '➡️');
  var gWord = gDir === 'up' ? 'ضغط صعودي على الذهب' : (gDir === 'down' ? 'ضغط هبوطي على الذهب' : 'تأثير محايد على الذهب');
  var gPct = item.gold.str * 10;

  var div = document.createElement('div');
  div.className = 'ni ' + rowClass;
  div.id = 'n' + item.id;
  div.innerHTML =
    '<div class="nmeta">' +
      '<span class="nsrc' + (item.trump ? ' tr' : '') + '">' + item.src.toUpperCase() + '</span>' +
      '<span class="ntm">' + item.time + '</span>' +
      '<span class="ntg ' + (tagClass[item.tag] || '') + '">' + item.tag + '</span>' +
    '</div>' +
    '<div class="nar">' + item.ar + '</div>' +
    '<div class="nen">' + (item.en.length > 120 ? item.en.substring(0,120) + '...' : item.en) + '</div>' +
    '<div class="gbox">' +
      '<div class="gtitle">🥇 تأثير على الذهب</div>' +
      '<div class="gimp ' + gDir + '">' + gIcon + ' ' + gWord + ' — شدة ' + item.gold.str + '/10</div>' +
      '<div class="gbar"><div class="gbarf ' + gDir + '" style="width:' + gPct + '%"></div></div>' +
      '<div class="greason">💡 ' + item.gold.why + '</div>' +
    '</div>';

  feed.insertBefore(div, feed.firstChild);
}

function markSent(id) {
  var el = document.getElementById('n' + id);
  if(el && !el.querySelector('.sent')) {
    var b = document.createElement('div');
    b.className = 'sent';
    b.textContent = '✅ أُرسل لتيليغرام';
    el.appendChild(b);
  }
}

function showAlert(txt) {
  var b = document.getElementById('alertBox');
  document.getElementById('alertTxt').textContent = txt;
  b.classList.add('show');
  setTimeout(function(){ b.classList.remove('show'); }, 9000);
}

function log(msg, type) {
  type = type || 'info';
  var box = document.getElementById('logBox');
  var d = document.createElement('div');
  d.className = 'll';
  d.innerHTML = '<span class="lt">[' + new Date().toLocaleTimeString('ar') + ']</span><span class="lm ' + type + '">' + msg + '</span>';
  box.appendChild(d);
  box.scrollTop = box.scrollHeight;
}

function startBot() {
  state.active = true;
  document.getElementById('btnStart').style.display = 'none';
  document.getElementById('btnStop').style.display = '';
  document.getElementById('sdot').classList.add('on');
  document.getElementById('stxt').textContent = '🟢 شغال — كل ' + fmtMs(state.speed);
  document.getElementById('stxt').style.color = 'var(--grn)';
  log('🚀 البوت شغال! كل ' + fmtMs(state.speed), 'ok');
  log('🥇 تحليل الذهب مفعّل لكل خبر', 'ok');
  log('🇺🇸 Truth Social ترامب مفعّل', 'ok');
  fetchNow();
  state.timerId = setInterval(fetchNow, state.speed);
}

function stopBot() {
  state.active = false;
  clearInterval(state.timerId);
  clearInterval(state.progTimer);
  document.getElementById('btnStart').style.display = '';
  document.getElementById('btnStop').style.display = 'none';
  document.getElementById('sdot').classList.remove('on');
  document.getElementById('stxt').textContent = '🔴 البوت متوقف';
  document.getElementById('stxt').style.color = 'var(--dim)';
  document.getElementById('pw').style.display = 'none';
  log('⏹ البوت أُوقف', 'warn');
}

renderSrc();
log('🌊 Hormuz Watch جاهز', 'info');
log('🔑 Token مربوط: ...' + BOT_TOKEN.slice(-8), 'ok');
log('💬 Chat ID مربوط: ' + CHAT_ID, 'ok');
log('اضغط ▶ تشغيل', 'info');
</script>
